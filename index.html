<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rohit Abhishek | रोहित अभिषेक</title>

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='80' fill='%23ffffff' font-family='sans-serif'>XII</text></svg>">

    <style>
        :root {
            --bg: #000000;
            --fg: #ffffff;
            --dim: #555555;
            --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font);
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-font-smoothing: antialiased;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            width: 100vw;
            min-height: 100vh;
            display: flex;
            justify-content: space-between;
            padding: 2.5vw;
            pointer-events: none;
            mix-blend-mode: difference;
        }

        .left-col {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 45%;
        }

        .right-col {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            width: 45%;
            pointer-events: auto;
        }

        h1 {
            font-size: 8vw;
            line-height: 0.85;
            letter-spacing: -0.04em;
            text-transform: uppercase;
            font-weight: 700;
        }

        .hindi-name {
            font-size: 4.8vw;
            line-height: 1.2;
            font-weight: 500;
            letter-spacing: -0.02em;
            margin-top: 0.5rem;
            margin-bottom: 1.5rem;
            color: var(--fg);
        }

        .bio {
            font-size: 1.2vw;
            line-height: 1.4;
            max-width: 90%;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .poetry {
            margin-top: 2rem;
            font-size: 1vw;
            color: var(--dim);
            font-style: italic;
        }

        /* Project Index */
        .project-list {
            list-style: none;
            width: 100%;
            text-align: right;
        }

        .project-item {
            border-top: 1px solid var(--dim);
            padding: 1.5rem 0;
            cursor: pointer;
            transition: padding-right 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .project-item:last-child {
            border-bottom: 1px solid var(--dim);
        }

        .project-item:hover {
            padding-right: 2rem;
        }

        .project-name {
            font-size: 2vw;
            font-weight: 600;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            display: block;
        }

        .project-desc {
            font-size: 0.85vw;
            color: var(--dim);
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: block;
        }

        .header-meta {
            font-size: 1vw;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            justify-content: space-between;
            width: 100%;
            pointer-events: auto;
            margin-bottom: 2rem;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* ==========================================
         * Mobile Responsive Breakpoint
         * ========================================== */
        @media (max-width: 768px) {
            body {
                overflow-y: scroll;
                /* Allows scrolling through text elements */
            }

            .ui-layer {
                flex-direction: column;
                justify-content: flex-start;
                gap: 5rem;
                padding: 6vw;
                height: auto;
            }

            .left-col,
            .right-col {
                width: 100%;
            }

            .right-col {
                align-items: flex-start;
                margin-bottom: 4rem;
            }

            h1 {
                font-size: 14vw;
            }

            .hindi-name {
                font-size: 9vw;
                margin-bottom: 2rem;
            }

            .bio {
                font-size: 3.8vw;
                max-width: 100%;
            }

            .poetry {
                font-size: 3.2vw;
                margin-top: 1.5rem;
            }

            .header-meta {
                font-size: 3.5vw;
            }

            .project-list {
                text-align: left;
            }

            .project-item {
                padding: 1.2rem 0;
            }

            .project-item:hover {
                padding-right: 0;
                padding-left: 1rem;
                /* Invert interaction direction for mobile */
            }

            .project-name {
                font-size: 5.5vw;
            }

            .project-desc {
                font-size: 3vw;
            }
        }
    </style>
</head>

<body>

    <canvas id="webgl"></canvas>

    <div class="ui-layer">

        <div class="left-col">
            <div class="header-meta">
                <span>XII VI // ARCHIVE</span>
                <a href="https://github.com/xii-vi" target="_blank">GITHUB ↗</a>
            </div>

            <div>
                <h1>Rohit<br>Abhishek</h1>

                <div class="bio">
                    Frontend Developer focusing on structural purity and rapid prototyping. Becoming better day by day.
                </div>
                <div class="poetry">
                    "When I'm sad, I write poetry. When I'm inspired, I write clean interfaces."
                </div>
            </div>
        </div>

        <div class="right-col">
            <ul class="project-list" id="projects">
            </ul>
        </div>

    </div>

    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
          }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. Data & Colors
        const projects = [
            { name: "Music-On-Keys", desc: "Auditory Canvas Mapping", color1: "#ff3366", color2: "#3300ff", link: "https://github.com/xii-vi/Music-On-Keys" },
            { name: "RA-0ne", desc: "Modular Front-end UI Framework", color1: "#00ffcc", color2: "#006600", link: "https://github.com/xii-vi/RA-0ne" },
            { name: "RE-Focus", desc: "Minimalist Focus Extension", color1: "#ffcc00", color2: "#ff3300", link: "https://github.com/xii-vi/RE-Focus" },
            { name: "RE-Think", desc: "Adaptive Testing Engine", color1: "#33ccff", color2: "#330066", link: "https://github.com/xii-vi/RE-Think" },
            { name: "RE-Verbnation", desc: "Desi Hip Hop Video Archive", color1: "#cc33ff", color2: "#330033", link: "https://github.com/xii-vi/RE-Verbnation" },
            { name: "RE_KICK", desc: "Premium Streetwear Platform", color1: "#ff6600", color2: "#330000", link: "https://github.com/xii-vi/RE_KICK" }
        ];

        // Base states for the shader
        const defaultColor1 = new THREE.Color("#444444");
        const defaultColor2 = new THREE.Color("#111111");
        let targetColor1 = defaultColor1.clone();
        let targetColor2 = defaultColor2.clone();
        let hoverIntensity = 0.0;

        // 2. Build DOM Projects
        const list = document.getElementById('projects');
        projects.forEach((proj, idx) => {
            const li = document.createElement('li');
            li.className = 'project-item';
            li.innerHTML = `
                <span class="project-name">0${idx + 1} // ${proj.name}</span>
                <span class="project-desc">${proj.desc}</span>
            `;

            // Desktop Hovers / Mobile Taps
            const activateState = () => {
                targetColor1.set(proj.color1);
                targetColor2.set(proj.color2);
                hoverIntensity = 1.0;
            };

            const deactivateState = () => {
                targetColor1.set(defaultColor1);
                targetColor2.set(defaultColor2);
                hoverIntensity = 0.0;
            };

            li.addEventListener('mouseenter', activateState);
            li.addEventListener('mouseleave', deactivateState);

            // Mobile touch fallback support
            li.addEventListener('touchstart', activateState, { passive: true });
            li.addEventListener('touchend', () => {
                setTimeout(deactivateState, 1000); // Hold color briefly on mobile touch release
            }, { passive: true });

            li.addEventListener('click', () => {
                window.open(proj.link, '_blank');
            });

            list.appendChild(li);
        });

        // 3. WebGL Setup
        const canvas = document.getElementById('webgl');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // 4. Custom GLSL Shader Material
        const uniforms = {
            uTime: { value: 0 },
            uColor1: { value: defaultColor1.clone() },
            uColor2: { value: defaultColor2.clone() },
            uHover: { value: 0 },
            uMouse: { value: new THREE.Vector2(0, 0) }
        };

        const vertexShader = `
            uniform float uTime;
            uniform float uHover;
            uniform vec2 uMouse;
            
            varying vec3 vNormal;
            varying vec3 vPosition;

            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

            float snoise(vec3 v) {
                const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy));
                vec3 x0 = v - i + dot(i, C.xxx);
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min(g.xyz, l.zxy);
                vec3 i2 = max(g.xyz, l.zxy);
                vec3 x1 = x0 - i1 + C.xxx;
                vec3 x2 = x0 - i2 + C.yyy;
                vec3 x3 = x0 - D.yyy;
                i = mod289(i);
                vec4 p = permute(permute(permute(
                            i.z + vec4(0.0, i1.z, i2.z, 1.0))
                          + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                          + i.x + vec4(0.0, i1.x, i2.x, 1.0));
                float n_ = 0.142857142857;
                vec3 ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_);
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4(x.xy, y.xy);
                vec4 b1 = vec4(x.zw, y.zw);
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
            }

            void main() {
                vNormal = normal;
                float noise = snoise(vec3(position.x * 1.5, position.y * 1.5, position.z * 1.5 + uTime * 0.5));
                float deformation = noise * (0.3 + (uHover * 0.4));
                vec3 newPosition = position + normal * deformation;
                
                vec2 projectedMouse = uMouse * 2.5; 
                float dist = distance(newPosition.xy, projectedMouse);
                float repel = smoothstep(1.5, 0.0, dist);
                newPosition.xy += normalize(newPosition.xy - projectedMouse) * repel * 0.5;

                vPosition = newPosition;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
            }
        `;

        const fragmentShader = `
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            
            varying vec3 vNormal;
            varying vec3 vPosition;

            void main() {
                vec3 viewDir = normalize(cameraPosition - vPosition);
                float fresnel = dot(viewDir, vNormal);
                fresnel = clamp(1.0 - fresnel, 0.0, 1.0);
                fresnel = pow(fresnel, 2.0); 
                
                vec3 baseColor = mix(uColor2, uColor1, smoothstep(-1.0, 1.0, vPosition.y));
                vec3 finalColor = baseColor + (vec3(1.0) * fresnel * 1.2);
                
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms,
            wireframe: false
        });

        const geometry = new THREE.IcosahedronGeometry(1.5, 64);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // 5. Interaction & Animation Loop
        const clock = new THREE.Clock();
        const mouse = new THREE.Vector2(0, 0);

        // Tracker for coordinates (Supports Touch + Desktop mouse)
        const updateCoordinates = (clientX, clientY) => {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            uniforms.uMouse.value.lerp(mouse, 0.1);
        };

        window.addEventListener('mousemove', (e) => updateCoordinates(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                updateCoordinates(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            uniforms.uTime.value = elapsedTime;

            uniforms.uColor1.value.lerp(targetColor1, 0.05);
            uniforms.uColor2.value.lerp(targetColor2, 0.05);
            uniforms.uHover.value += (hoverIntensity - uniforms.uHover.value) * 0.05;

            mesh.rotation.y = elapsedTime * 0.1;
            mesh.rotation.x = elapsedTime * 0.05;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>

</html>
